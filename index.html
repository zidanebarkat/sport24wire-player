<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>beIN MAX 1 (AR) - Live</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
video{width:100%;height:100%;object-fit:contain;background:#000}
#overlay{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#000;color:#fff;font-family:sans-serif;font-size:14px;transition:opacity .5s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay .spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top-color:#e63946;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#unmuteBtn{position:fixed;bottom:80px;right:20px;z-index:20;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);color:#fff;width:48px;height:48px;border-radius:50%;font-size:20px;cursor:pointer;display:none}
#unmuteBtn:hover{background:rgba(255,255,255,.2)}
.controls{position:fixed;bottom:0;left:0;right:0;padding:20px 24px;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);z-index:5;display:flex;align-items:center;gap:16px;opacity:0;transition:opacity .3s;pointer-events:none}
.vid:hover~.controls,.controls:hover{opacity:1;pointer-events:auto}
.controls button{background:rgba(255,255,255,.15);border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px}
.controls button:hover{background:rgba(255,255,255,.3)}
.controls .bar-wrap{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative}
.controls .bar-wrap .fill{height:100%;background:#e63946;border-radius:2px;width:0%}
.controls .time{color:rgba(255,255,255,.7);font-size:13px;min-width:90px;text-align:center;font-variant-numeric:tabular-nums}
.top-bar{position:fixed;top:0;left:0;right:0;padding:12px 20px;background:linear-gradient(to bottom,rgba(0,0,0,.85) 0%,transparent 100%);z-index:5;display:flex;align-items:center;opacity:0;transition:opacity .3s;pointer-events:none}
.vid:hover~.top-bar,.top-bar:hover{opacity:1;pointer-events:auto}
.top-bar .logo{color:#fff;font-weight:800;font-size:14px}
.top-bar .logo span{color:#e63946}
.top-bar .info{margin-left:auto;color:rgba(255,255,255,.7);font-size:12px;text-align:right}
.top-bar .info strong{color:#fff;display:block;font-size:14px}
@media(max-width:600px){.controls{padding:14px 16px;gap:10px}.controls button{width:36px;height:36px;font-size:15px}}
</style>
</head>
<body>

<video id="video" class="vid" playsinline autoplay muted></video>

<div class="top-bar">
  <div class="logo">Sport<span>24</span>Wire</div>
  <div class="info"><strong>beIN MAX 1 (AR)</strong>World Cup - Portugal vs Spain</div>
</div>

<div class="controls">
  <button id="playBtn">⏸</button>
  <div class="bar-wrap"><div class="fill" id="progressBar"></div></div>
  <span class="time" id="timeDisplay">0:00 / 0:00</span>
  <button id="fsBtn">⛶</button>
</div>

<button id="unmuteBtn">🔇</button>

<div id="overlay"><div class="spinner"></div><div id="msg">Loading stream...</div></div>

<script>
const video=document.getElementById('video');
const overlay=document.getElementById('overlay');
const msg=document.getElementById('msg');
const playBtn=document.getElementById('playBtn');
const progressBar=document.getElementById('progressBar');
const timeDisplay=document.getElementById('timeDisplay');
const fsBtn=document.getElementById('fsBtn');
const unmuteBtn=document.getElementById('unmuteBtn');
const URL='https://2.simokora.com/my-hls/h9asfma10d5.m3u8';

let hls=null;

function showOverlay(t){overlay.classList.remove('hidden');msg.textContent=t}
function hideOverlay(){overlay.classList.add('hidden')}
function formatTime(t){if(!t||isNaN(t))return'0:00';return Math.floor(t/60)+':'+String(Math.floor(t%60)).padStart(2,'0')}

if(Hls.isSupported()){
  hls=new Hls({enableWorker:false});
  hls.loadSource(URL);
  hls.attachMedia(video);
  hls.on(Hls.Events.MANIFEST_PARSED,()=>{
    hideOverlay();
    setTimeout(()=>{
      video.muted=false;
      video.play().catch(()=>{
        video.muted=true;
        unmuteBtn.style.display='block';
      });
    },500);
  });
  hls.on(Hls.Events.ERROR,(e,data)=>{
    if(data.fatal){
      showOverlay('Reconnecting...');
      if(data.type===Hls.ErrorTypes.NETWORK_ERROR){
        setTimeout(()=>hls.startLoad(),2000);
      }else{
        setTimeout(()=>window.location.reload(),5000);
      }
    }
  });
}else{
  msg.textContent='HLS not supported';
}

unmuteBtn.addEventListener('click',()=>{
  video.muted=false;
  video.play().then(()=>unmuteBtn.style.display='none').catch(()=>{});
});

playBtn.addEventListener('click',()=>{
  if(video.paused){video.play()}else{video.pause()}
});
video.addEventListener('play',()=>{playBtn.textContent='⏸'});
video.addEventListener('pause',()=>{playBtn.textContent='▶'});
video.addEventListener('timeupdate',()=>{
  if(video.duration){
    progressBar.style.width=((video.currentTime/video.duration)*100)+'%';
    timeDisplay.textContent=formatTime(video.currentTime)+' / '+formatTime(video.duration);
  }
});
document.querySelector('.bar-wrap').addEventListener('click',(e)=>{
  const r=e.currentTarget.getBoundingClientRect();
  video.currentTime=((e.clientX-r.left)/r.width)*video.duration;
});
fsBtn.addEventListener('click',()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});
</script>
</body>
</html>
