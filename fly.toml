# fly.toml app configuration file generated for sport24wire-restream on 2026-07-06T20:32:41+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sport24wire-restream'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"

[env]
  HLS_URL = 'https://2.simokora.com/my-hls/h9asfma10d5.m3u8'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  ports = []

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
